<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBuddy | AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="brand">
                <div class="avatar">
                    <svg class="robot-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="6" width="18" height="13" rx="3" stroke="white" stroke-width="2" fill="none"/>
                        <circle cx="8.5" cy="12.5" r="1.5" fill="white"/>
                        <circle cx="15.5" cy="12.5" r="1.5" fill="white"/>
                        <path d="M12 6V3M9 3h6" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <path d="M9 16h6" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <div>
                    <h2>ChatBuddy</h2>
                    <span class="status">Online</span>
                </div>
            </div>
        </div>

        <div id="chat-window" class="chat-window">
            <div class="message bot">Hi! I'm ChatBuddy. How can I help you today?</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask ChatBuddy something..." autocomplete="off">
            <button id="send-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
